<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>
    <h1>HTML Table</h1>
    <table border="2">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody border="2">
            <tr>
                <td>Baagii</td>
                <td>14</td>
            </tr>
            <tr>
                <td>HIRA</td>
                <td>14</td>
            </tr>
        </tbody border=2>
    </table>

    <h1>THML Table colspan, Rowspan</h1>

    <table border="2">
        <thead>
            <tr>
                <th>Name</th>
                <th colspan="2"> Activity</th>
            </tr>
        </thead>
        <tbody border="2">
            <tr>
                <td>Baagii</td>
                <td>student</td>
                <td>8years</td>
            </tr>
            <tr>
                <td>Hira</td>
                <td>Play volleyball</td>
                <td>3 years</td>
            </tr>
        </tbody>
    </table>

            </tr>
            <tr sowapan="2">strawberry</tr>
    </table>


</body>

</html>
